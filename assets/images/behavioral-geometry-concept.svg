<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">

<style>
.box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:8; }
.text { font-family:Arial, Helvetica, sans-serif; font-size:16px; fill:#222; text-anchor:middle; dominant-baseline:middle; }
.arrow { stroke:#444; stroke-width:2; marker-end:url(#arrowhead); }
</style>

<defs>
<marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
<polygon points="0 0, 12 4, 0 8" fill="#444"/>
</marker>
</defs>

<rect class="box" x="40" y="80" width="180" height="60"/>
<text class="text" x="130" y="110">Program Execution</text>

<rect class="box" x="260" y="80" width="180" height="60"/>
<text class="text" x="350" y="110">System Telemetry</text>

<rect class="box" x="480" y="80" width="200" height="60"/>
<text class="text" x="580" y="110">Behavioral Trajectory</text>

<rect class="box" x="720" y="80" width="200" height="60"/>
<text class="text" x="820" y="110">Structural Analysis</text>

<rect class="box" x="960" y="80" width="200" height="60"/>
<text class="text" x="1060" y="110">Malware Detection</text>

<line class="arrow" x1="220" y1="110" x2="260" y2="110"/>
<line class="arrow" x1="440" y1="110" x2="480" y2="110"/>
<line class="arrow" x1="680" y1="110" x2="720" y2="110"/>
<line class="arrow" x1="920" y1="110" x2="960" y2="110"/>

</svg>
